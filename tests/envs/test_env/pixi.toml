[workspace]
name = "test_env"
version = "0.1.0"
description = "Minimal ginkgo test environment for Pixi integration tests"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]

[dependencies]
python = ">=3.11"
pytest = ">=8.0"

[pypi-dependencies]
ginkgo = { path = "../../..", editable = true }
