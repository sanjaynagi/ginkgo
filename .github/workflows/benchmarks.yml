name: Benchmarks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
          locked: true

      - name: Run benchmark suite
        run: >
          pixi run benchmark --
          --jobs 2
          --cores 2
          --baseline benchmarks/baselines/github-actions-linux.json
          --strict

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results
